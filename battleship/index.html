<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0D1117" />
  <title>BATTLESHIP</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="/css/online-lobby.css" />
  <link rel="stylesheet" href="/css/leaderboard.css" />
</head>
<body>

  <!-- ================= TOAST ================= -->
  <div class="toast-container" id="toast-container"></div>

  <!-- ================= START SCREEN ================= -->
  <div class="screen active" id="start-screen">
    <div class="screen-content">
      <h1 class="game-title">BATTLESHIP</h1>
      <p class="game-subtitle">전략 해전 게임 · 1P vs AI</p>

      <div class="stats-panel">
        <div class="stat-item">
          <span class="stat-value" id="stat-wins">0</span>
          <span class="stat-label">승리</span>
        </div>
        <div class="stat-item">
          <span class="stat-value" id="stat-losses">0</span>
          <span class="stat-label">패배</span>
        </div>
        <div class="stat-item">
          <span class="stat-value" id="stat-games">0</span>
          <span class="stat-label">총 게임</span>
        </div>
      </div>

      <button class="btn btn-primary btn-full" id="btn-new-game">
        ⚓ AI 대전
      </button>
      <button class="btn-online-start" id="btn-online">
        🌐 온라인 대전
      </button>

      <p class="start-hint">
        AI 대전: 컴퓨터와 1:1 대결<br/>
        온라인 대전: 친구와 실시간 대결
      </p>
    </div>
  </div>

  <!-- ================= LOBBY SCREEN ================= -->
  <div class="screen" id="lobby-screen">
    <div class="screen-content">
      <div class="lobby-title">ONLINE</div>
      <div class="lobby-subtitle">친구와 실시간 대전</div>

      <div id="lobby-main">
        <div class="room-list-section">
          <div class="room-list-header">
            <span class="room-list-title">대기 중인 방</span>
            <button id="btn-refresh-rooms">새로고침</button>
          </div>
          <div class="room-list" id="room-list">
            <p class="room-list-empty">불러오는 중...</p>
          </div>
        </div>

        <div class="lobby-divider"><span>또는 직접</span></div>

        <div class="lobby-actions">
          <button id="btn-create-room">방 만들기</button>
          <div class="join-input-group">
            <input type="text" id="join-code-input" class="code-input" maxlength="4" placeholder="코드 입력" autocomplete="off" spellcheck="false" />
            <button id="btn-join-room">참가</button>
          </div>
          <p class="join-error" id="join-error"></p>
        </div>
      </div>

      <div id="lobby-waiting" class="lobby-waiting">
        <div class="waiting-panel">
          <div class="room-code-display">
            <span class="room-code-label">방 코드</span>
            <span class="room-code" id="waiting-code">XXXX</span>
            <button id="btn-copy-code">복사</button>
          </div>
          <p class="waiting-text" id="waiting-msg">상대방을 기다리는 중...</p>
          <div class="waiting-dots">
            <span></span><span></span><span></span>
          </div>
        </div>
        <button id="btn-waiting-cancel">취소</button>
      </div>

      <button id="btn-lobby-back">돌아가기</button>
    </div>
  </div>

  <!-- ================= PLACE SCREEN ================= -->
  <div class="screen" id="place-screen">
    <div class="screen-content" style="max-width:480px;">
      <h2 class="screen-title">함선 배치</h2>

      <div class="ship-list" id="ship-list"></div>

      <!-- Place board -->
      <div class="board-wrapper" style="width:100%;">
        <div class="board-label">
          <span class="indicator"></span>내 해역
        </div>
        <div class="board-grid place-board" id="place-board"></div>
      </div>

      <div class="btn-group">
        <button class="btn btn-sm" id="btn-rotate">회전 (가로)</button>
        <button class="btn btn-sm" id="btn-auto-place">자동 배치</button>
        <button class="btn btn-sm btn-danger" id="btn-reset-place">초기화</button>
      </div>

      <button class="btn btn-primary btn-full" id="btn-start-game" disabled>
        전투 시작
      </button>
    </div>
  </div>

  <!-- ================= GAME SCREEN ================= -->
  <div class="screen" id="game-screen">
    <div class="game-container">

      <!-- Header -->
      <div class="game-header">
        <span class="game-header-title">BATTLESHIP</span>
        <span class="turn-indicator player-turn" id="turn-indicator">내 차례</span>
      </div>

      <!-- Status -->
      <div class="status-bar" id="status-bar">공격할 적 함선을 선택하세요</div>

      <!-- Enemy board (attack target) -->
      <div class="board-wrapper">
        <div class="board-label active" id="enemy-board-label">
          <span class="indicator"></span>적 해역 (공격)
        </div>
        <div class="board-grid enemy-board" id="enemy-board"></div>
      </div>

      <!-- HUD: ship tracker (between boards) -->
      <div class="ships-hud-row">
        <div class="ships-hud">
          <div class="hud-label">적 함선</div>
          <div class="ships-row" id="enemy-ships-row"></div>
        </div>
        <div class="ships-hud">
          <div class="hud-label">내 함선</div>
          <div class="ships-row" id="player-ships-row"></div>
        </div>
      </div>

      <!-- Player board (own ships, compact) -->
      <div class="board-wrapper board-wrapper-mini">
        <div class="board-label" id="player-board-label">
          <span class="indicator"></span>내 해역 (방어)
        </div>
        <div class="board-grid" id="player-board"></div>
      </div>

    </div>
  </div>

  <!-- ================= RESULT SCREEN ================= -->
  <div class="screen" id="result-screen">
    <div class="screen-content">
      <div class="result-emoji" id="result-emoji">🏆</div>
      <h2 class="result-title win" id="result-title">승리!</h2>
      <p class="result-desc" id="result-desc">모든 적 함선을 격침했습니다!</p>

      <div class="result-stats">
        <div class="result-stat">
          <span class="result-stat-val" id="result-shots">0</span>
          <span class="result-stat-label">총 공격 횟수</span>
        </div>
        <div class="result-stat">
          <span class="result-stat-val" id="result-accuracy">0%</span>
          <span class="result-stat-label">명중률</span>
        </div>
        <div class="result-stat">
          <span class="result-stat-val" id="result-total-wins">0</span>
          <span class="result-stat-label">누적 승리</span>
        </div>
        <div class="result-stat">
          <span class="result-stat-val" id="result-total-losses">0</span>
          <span class="result-stat-label">누적 패배</span>
        </div>
      </div>

      <div class="btn-group">
        <button class="btn btn-primary" id="btn-play-again">다시 하기</button>
        <button class="btn" id="btn-home">처음으로</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/supabase-config.js"></script>
<script src="/js/leaderboard.js"></script>
<script src="js/game.js"></script>
<script src="js/online.js"></script>
</body>
</html>
