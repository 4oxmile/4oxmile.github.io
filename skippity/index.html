<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>SKIPPITY</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>" />
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/nav.css">
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="/css/leaderboard.css" />
  <link rel="stylesheet" href="/css/game-icons.css" />
  <link rel="stylesheet" href="/css/online-lobby.css" />
</head>
<body>

<div class="toast-container" id="toast-container"></div>

<a href="/" class="home-btn" aria-label="홈으로">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="15 18 9 12 15 6"/>
  </svg>
</a>

<!-- ══ START OVERLAY ══ -->
<div class="overlay" id="start-overlay">
  <div class="overlay-content">
    <div class="game-logo-css"><span class="icon-skippity"></span></div>
    <h1 class="game-title">SKIPPITY</h1>
    <p class="game-desc">말을 뛰어넘어 캡처하고<br>5색 세트를 모으세요</p>

    <div class="stats-bar">
      <div class="stat-item wins">
        <span class="stat-label">승리</span>
        <span class="stat-value" id="stat-wins">0</span>
      </div>
      <div class="stat-item draws">
        <span class="stat-label">무승부</span>
        <span class="stat-value" id="stat-draws">0</span>
      </div>
      <div class="stat-item losses">
        <span class="stat-label">패배</span>
        <span class="stat-value" id="stat-losses">0</span>
      </div>
    </div>

    <span class="section-label">난이도 선택</span>
    <div class="difficulty-row">
      <button class="diff-btn" data-diff="easy">쉬움</button>
      <button class="diff-btn active" data-diff="normal">보통</button>
      <button class="diff-btn" data-diff="hard">어려움</button>
    </div>

    <button class="cta-btn" id="start-btn">게임 시작</button>
    <button class="btn-online" id="btn-online">🌐 온라인 대전</button>
  </div>
</div>

<!-- ══ LOBBY OVERLAY ══ -->
<div class="overlay hidden" id="lobby-screen">
  <div class="screen-content">
    <div class="lobby-title">ONLINE</div>
    <div class="lobby-subtitle">친구와 실시간 스킵피티 대전</div>

    <div id="lobby-main">
      <div class="room-list-section">
        <div class="room-list-header">
          <span class="room-list-title">대기 중인 방</span>
          <button id="btn-refresh-rooms">새로고침</button>
        </div>
        <div class="room-list" id="room-list">
          <p class="room-list-empty">불러오는 중...</p>
        </div>
      </div>

      <div class="lobby-divider"><span>또는 직접</span></div>

      <div class="lobby-actions">
        <button id="btn-create-room">방 만들기</button>
        <div class="join-input-group">
          <input type="text" id="join-code-input" class="code-input"
                 maxlength="4" placeholder="코드 입력" autocomplete="off" spellcheck="false" />
          <button id="btn-join-room">참가</button>
        </div>
        <p class="join-error" id="join-error"></p>
      </div>
    </div>

    <div id="lobby-waiting" class="lobby-waiting">
      <div class="waiting-panel">
        <div class="room-code-display">
          <span class="room-code-label">방 코드</span>
          <span class="room-code" id="waiting-code">XXXX</span>
          <button id="btn-copy-code">복사</button>
        </div>
        <p class="waiting-text" id="waiting-msg">상대방을 기다리는 중...</p>
        <div class="waiting-dots"><span></span><span></span><span></span></div>
      </div>
      <button id="btn-waiting-cancel">취소</button>
    </div>

    <button id="btn-lobby-back">돌아가기</button>
  </div>
</div>

<!-- ══ RESULT OVERLAY ══ -->
<div class="overlay hidden" id="result-overlay">
  <div class="overlay-content">
    <div class="result-icon" id="result-icon">🏆</div>
    <h2 class="over-title result-title" id="result-title">승리!</h2>
    <p class="game-desc" id="result-subtitle"></p>

    <div class="result-scores" id="result-scores"></div>

    <button class="cta-btn" id="play-again-btn">다시 하기</button>
    <button class="btn-secondary" id="back-btn">메인으로</button>
  </div>
</div>

<!-- ══ GAME CONTAINER ══ -->
<div id="game-container">

  <div class="game-header">
    <span class="header-title">SKIPPITY</span>
    <div class="header-controls">
      <button class="icon-btn" id="restart-btn" title="재시작">↺</button>
      <button class="icon-btn" id="menu-btn" title="메인 메뉴">☰</button>
    </div>
  </div>

  <!-- Score Panel -->
  <div class="score-panel">
    <div class="score-row" id="player-row">
      <span class="score-label">당신</span>
      <div class="color-counts" id="player-counts"></div>
      <div class="set-badge"><span id="player-sets">0</span>세트</div>
    </div>
    <div class="score-row" id="ai-row">
      <span class="score-label" id="ai-label">AI</span>
      <div class="color-counts" id="ai-counts"></div>
      <div class="set-badge"><span id="ai-sets">0</span>세트</div>
    </div>
  </div>

  <!-- Turn Indicator -->
  <div class="turn-indicator" id="turn-indicator">
    <div class="turn-disc player" id="turn-disc"></div>
    <span class="turn-text" id="turn-text">당신의 차례</span>
    <button class="end-turn-btn hidden" id="end-turn-btn">턴 종료</button>
  </div>

  <!-- Board -->
  <div class="board-wrapper">
    <div id="board"></div>
  </div>

</div>

<script src="/js/theme-init.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/supabase-config.js"></script>
<script src="/js/leaderboard.js"></script>
<script src="js/game.js"></script>
<script src="js/online.js"></script>

</body>
</html>
