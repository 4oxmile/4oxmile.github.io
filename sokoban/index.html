<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0D1117" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>SOKOBAN</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>" />
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/nav.css">
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="/css/leaderboard.css" />
  <link rel="stylesheet" href="/css/game-icons.css" />
</head>
<body>
<a href="/" class="home-btn" aria-label="홈으로"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></a>
  <div id="app">

    <!-- ════════════ START SCREEN ════════════ -->
    <div id="start-screen" class="overlay">
      <div class="overlay-content">
        <div class="game-logo-css"><span class="icon-sokoban"></span></div>
        <h1 class="game-title">SOKOBAN</h1>
        <p class="game-desc">창고지기 퍼즐</p>

        <button id="btn-start" class="cta-btn">레벨 선택</button>
        <button id="btn-continue" class="cta-btn" style="display:none;">계속하기</button>

        <p class="game-hint">방향키 또는 스와이프로 이동</p>
      </div>
    </div>

    <!-- ════════════ LEVEL SELECT SCREEN ════════════ -->
    <div id="level-select-screen" class="overlay hidden">
      <div style="display:flex;align-items:center;gap:12px;width:100%;margin-bottom:4px;">
        <button id="btn-back-start" class="icon-btn" title="뒤로">←</button>
        <h2 class="screen-title">레벨 선택</h2>
      </div>
      <div style="font-size:12px;color:var(--text-muted);width:100%;margin-bottom:16px;">
        ⭐ 클리어한 레벨
      </div>
      <div id="level-grid" class="level-grid"></div>
    </div>

    <!-- ════════════ GAME SCREEN ════════════ -->
    <div id="game-screen" class="overlay hidden">
      <div class="game-header">
        <div class="header-left">
          <button id="btn-menu" class="icon-btn" title="메뉴">☰</button>
          <div>
            <div class="level-label">LEVEL</div>
            <div class="level-number" id="current-level-num">1</div>
          </div>
        </div>

        <div class="move-display">
          <div class="move-count" id="move-count">0</div>
          <div class="move-label">이동수</div>
        </div>

        <div class="header-right" style="flex-direction:column;align-items:flex-end;gap:2px;">
          <div style="display:flex;gap:4px;">
            <span class="best-label">최고</span>
            <span class="best-value" id="best-value">-</span>
          </div>
          <div style="display:flex;gap:6px;">
            <button id="btn-undo" class="icon-btn" title="되돌리기 (Z)">↩</button>
            <button id="btn-restart" class="icon-btn" title="재시작 (R)">↺</button>
          </div>
        </div>
      </div>

      <div id="board-wrapper">
        <canvas id="game-canvas"></canvas>
      </div>

      <div class="dpad-container">
        <div class="dpad-row">
          <div class="dpad-spacer"></div>
          <button id="dpad-up" class="dpad-btn" aria-label="위">▲</button>
          <div class="dpad-spacer"></div>
        </div>
        <div class="dpad-row-middle">
          <button id="dpad-left" class="dpad-btn" aria-label="왼쪽">◀</button>
          <button id="dpad-down" class="dpad-btn" aria-label="아래">▼</button>
          <button id="dpad-right" class="dpad-btn" aria-label="오른쪽">▶</button>
        </div>
        <div class="action-row">
          <button id="btn-levels" class="action-btn">
            <span>☰</span> 레벨
          </button>
          <button id="btn-restart-2" class="action-btn" onclick="game._restartLevel()">
            <span>↺</span> 재시작
          </button>
        </div>
      </div>
    </div>

    <!-- ════════════ VICTORY SCREEN ════════════ -->
    <div id="victory-screen" class="overlay overlay-screen hidden">
      <div class="overlay-content">
        <div class="victory-icon">🎉</div>
        <div class="over-title">레벨 클리어!</div>

        <div class="victory-stats">
          <div class="stat-row">
            <span class="stat-label">레벨</span>
            <span class="stat-value" id="victory-level-num">1</span>
          </div>
          <div class="stat-row">
            <span class="stat-label">이동수</span>
            <span class="stat-value" id="victory-moves">0</span>
          </div>
          <div class="stat-row">
            <span class="stat-label">최고 기록</span>
            <span class="stat-value" id="victory-best">0</span>
            <span id="new-best-badge" class="new-best-badge" style="display:none;">NEW BEST</span>
          </div>
        </div>

        <div class="victory-buttons">
          <button id="btn-next-level" class="cta-btn">다음 레벨</button>
          <button id="btn-victory-restart" class="btn">↺ 다시 하기</button>
          <button id="btn-victory-levels" class="btn btn-ghost">☰ 레벨 선택</button>
        </div>
      </div>
    </div>

    <!-- ════════════ ALL CLEAR SCREEN ════════════ -->
    <div id="allclear-screen" class="overlay overlay-screen hidden">
      <div class="overlay-content">
        <div class="allclear-icon">🏆</div>
        <div class="over-title allclear-title">ALL CLEAR!</div>
        <p class="game-desc">
          모든 레벨을 클리어했습니다!<br />
          정말 대단해요! 🎊
        </p>
        <button id="btn-allclear-levels" class="cta-btn">↺ 레벨 다시 보기</button>
        <button id="btn-allclear-menu" class="btn btn-ghost">처음으로</button>
      </div>
    </div>

  </div>

  <script src="/js/theme-init.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/supabase-config.js"></script>
<script src="/js/leaderboard.js"></script>
<script src="js/game.js"></script>
</body>
</html>
