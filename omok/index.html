<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0D1117" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#FFFFFF" media="(prefers-color-scheme: light)">
  <title>오목 - OMOK</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>">
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="/css/online-lobby.css" />
  <link rel="stylesheet" href="/css/leaderboard.css">
  <link rel="stylesheet" href="/css/game-icons.css">
</head>
<body>

  <div class="toast-container" id="toast-container"></div>

  <!-- ── Start Screen ── -->
  <div class="overlay" id="start-screen">
    <div class="screen-content">
      <div class="game-logo-css"><span class="icon-omok"></span></div>
      <div class="game-title">OMOK</div>
      <div class="game-subtitle">오목 · Gomoku</div>

      <div class="stats-box">
        <div class="stat-item">
          <div class="stat-value" id="stat-win">0</div>
          <div class="stat-label">승</div>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <div class="stat-value" id="stat-loss">0</div>
          <div class="stat-label">패</div>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <div class="stat-value" id="stat-total">0</div>
          <div class="stat-label">판</div>
        </div>
      </div>

      <button class="btn btn-primary" id="btn-start">게임 시작</button>
      <button class="btn-online" id="btn-online">🌐 온라인 대전</button>
    </div>
  </div>

  <!-- ── Lobby Screen ── -->
  <div class="overlay hidden" id="lobby-screen">
    <div class="screen-content">
      <div class="lobby-title">ONLINE</div>
      <div class="lobby-subtitle">친구와 실시간 오목 대전</div>

      <div id="lobby-main">
        <div class="room-list-section">
          <div class="room-list-header">
            <span class="room-list-title">대기 중인 방</span>
            <button id="btn-refresh-rooms">새로고침</button>
          </div>
          <div class="room-list" id="room-list">
            <p class="room-list-empty">불러오는 중...</p>
          </div>
        </div>

        <div class="lobby-divider"><span>또는 직접</span></div>

        <div class="lobby-actions">
          <button id="btn-create-room">방 만들기</button>
          <div class="join-input-group">
            <input type="text" id="join-code-input" class="code-input" maxlength="4" placeholder="코드 입력" autocomplete="off" spellcheck="false" />
            <button id="btn-join-room">참가</button>
          </div>
          <p class="join-error" id="join-error"></p>
        </div>
      </div>

      <div id="lobby-waiting" class="lobby-waiting">
        <div class="waiting-panel">
          <div class="room-code-display">
            <span class="room-code-label">방 코드</span>
            <span class="room-code" id="waiting-code">XXXX</span>
            <button id="btn-copy-code">복사</button>
          </div>
          <p class="waiting-text" id="waiting-msg">상대방을 기다리는 중...</p>
          <div class="waiting-dots"><span></span><span></span><span></span></div>
        </div>
        <button id="btn-waiting-cancel">취소</button>
      </div>

      <button id="btn-lobby-back">돌아가기</button>
    </div>
  </div>

  <!-- ── Result Screen ── -->
  <div class="overlay hidden" id="result-screen">
    <div class="screen-content">
      <div class="result-emoji" id="result-emoji">🎉</div>
      <div class="result-title win" id="result-title">승리!</div>
      <div class="result-subtitle" id="result-subtitle">축하합니다! AI를 이겼습니다.</div>
      <button class="btn btn-primary" id="btn-play-again">다시 하기</button>
      <button class="btn" id="btn-home-result">홈으로</button>
    </div>
  </div>

  <!-- ── Game Screen (always rendered) ── -->
  <div id="game-screen">

    <!-- Header -->
    <div class="game-header">
      <div class="header-title">OMOK</div>
      <div class="header-actions">
        <button class="btn btn-small" id="btn-undo" title="무르기">← 무르기</button>
        <button class="btn btn-small" id="btn-restart" title="새 게임">새 게임</button>
        <button class="btn btn-small" id="btn-home" title="홈">홈</button>
      </div>
    </div>

    <!-- Status bar -->
    <div class="status-bar">
      <div class="turn-indicator">
        <div class="stone-dot black" id="turn-dot"></div>
        <span id="turn-label">당신 (흑)</span>
      </div>
      <div class="status-text" id="status-text">흑이 먼저 시작합니다</div>
    </div>

    <!-- Board -->
    <div class="canvas-wrapper">
      <canvas id="board"></canvas>
    </div>

    <!-- Mini stats -->
    <div class="mini-stats">
      <div class="mini-stat wins">
        <div class="val" id="mini-win">0</div>
        <div class="lbl">승</div>
      </div>
      <div class="mini-stat losses">
        <div class="val" id="mini-loss">0</div>
        <div class="lbl">패</div>
      </div>
      <div class="mini-stat games">
        <div class="val" id="mini-total">0</div>
        <div class="lbl">판</div>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/supabase-config.js"></script>
<script src="/js/leaderboard.js"></script>
<script src="js/game.js"></script>
<script src="js/online.js"></script>
</body>
</html>
