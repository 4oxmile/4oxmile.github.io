<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0D1117">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>MATCH 3</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💎</text></svg>">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="/css/leaderboard.css">
  <link rel="stylesheet" href="/css/game-icons.css">
</head>
<body>
  <div id="app">

    <!-- Start Screen -->
    <div id="start-screen" class="overlay">
      <div class="overlay-content">
        <div class="game-logo-css"><span class="icon-match3"></span></div>
        <h1 class="game-title">MATCH 3</h1>
        <p class="subtitle">탭하여 시작</p>
        <div class="start-info">
          <span>최고 점수: <span id="start-highscore">0</span></span>
        </div>
      </div>
    </div>

    <!-- Game Over Screen -->
    <div id="gameover-screen" class="overlay hidden">
      <div class="overlay-content">
        <h2 class="gameover-title">GAME OVER</h2>
        <div class="final-score">
          <div class="score-label">점수</div>
          <div id="final-score-value" class="score-value">0</div>
        </div>
        <div class="final-stats">
          <div class="stat">
            <span class="stat-label">콤보</span>
            <span id="final-combos" class="stat-value">0</span>
          </div>
          <div class="stat">
            <span class="stat-label">매치</span>
            <span id="final-matches" class="stat-value">0</span>
          </div>
        </div>
        <p class="subtitle">탭하여 다시 시작</p>
      </div>
    </div>

    <!-- Game Header -->
    <div id="game-header">
      <div class="header-stat">
        <span class="hstat-label">점수</span>
        <span class="hstat-value accent" id="score-display">0</span>
      </div>
      <div class="header-stat center-stat">
        <div id="timer-bar-wrap">
          <div id="timer-bar"></div>
        </div>
        <span class="hstat-value" id="timer-display">60</span>
      </div>
      <div class="header-stat">
        <span class="hstat-label">최고</span>
        <span class="hstat-value" id="highscore-display">0</span>
      </div>
    </div>

    <!-- Game Board -->
    <div id="board-wrapper">
      <canvas id="board-canvas"></canvas>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/supabase-config.js"></script>
  <script src="/js/leaderboard.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
